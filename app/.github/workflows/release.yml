name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Se activa cuando haces push de un tag como v1.0.0
  workflow_dispatch:  # También permite ejecución manual

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Generar archivo de versión
      run: python create_version_file.py
    
    - name: Compilar con PyInstaller
      run: pyinstaller build.spec
    
    - name: Obtener versión
      id: get_version
      shell: bash
      run: |
        VERSION=$(python -c "from version import __version__; print(__version__)")
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Versión detectada: $VERSION"
    
    - name: Listar archivos generados
      run: |
        echo "Contenido de dist:"
        dir dist
    
    - name: Renombrar ejecutable
      shell: bash
      run: |
        cd dist
        EXE_NAME=$(ls *.exe | head -1)
        NEW_NAME="TuLocalV12025-v${{ steps.get_version.outputs.VERSION }}.exe"
        mv "$EXE_NAME" "$NEW_NAME"
        echo "Ejecutable renombrado a: $NEW_NAME"
    
    - name: Crear Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.exe
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🎉 Nueva versión de App Compras y Ventas
          
          ### Cambios en esta versión:
          - Agrega aquí los cambios principales
          - Correcciones de bugs
          - Nuevas funcionalidades
          
          ### 📥 Instalación
          1. Descarga el archivo .exe
          2. Extrae la carpeta completa
          3. Ejecuta el archivo principal
          4. ¡Listo!
          
          ### ⚠️ Notas importantes
          - Esta versión incluye actualización automática
          - Si tienes una versión anterior, se actualizará automáticamente
          - Asegúrate de hacer backup de tu base de datos antes de actualizar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Subir artefactos (backup)
      uses: actions/upload-artifact@v3
      with:
        name: TuLocalV12025-exe
        path: dist/*.exe
        retention-days: 30