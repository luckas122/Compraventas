name: Build Windows EXE and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build with PyInstaller (ONEDIR)
        shell: bash
        run: |
          python -m PyInstaller build.spec --clean
          ls -la dist || dir dist

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V=$(python -c "from version import __version__; print(__version__)")
          echo "version=$V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Resolve app name
        id: app
        shell: bash
        run: |
          A=$(python -c "from version import __app_name__; print(__app_name__)")
          echo "name=$A"
          echo "name=$A" >> "$GITHUB_OUTPUT"

      - name: Zip ONEDIR folder
        shell: pwsh
        run: |
          $app = "${{ steps.app.outputs.name }}"
          $ver = "${{ steps.ver.outputs.version }}"
          $src = "dist/$app/*"
          $zip = "Compraventas-v$ver-onedir.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path $src -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Create Release and Upload assets (EXE + ZIP)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/${{ steps.app.outputs.name }}/${{ steps.app.outputs.name }}-v${{ steps.ver.outputs.version }}.exe
            Compraventas-v${{ steps.ver.outputs.version }}-onedir.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
