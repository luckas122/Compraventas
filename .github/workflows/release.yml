name: Build Windows EXE and Release

permissions:
  contents: write

on:
  push:
    tags: ['v*.*.*']     # corre sólo al pushear un tag vX.Y.Z
  workflow_dispatch:      # opcional: ejecutarlo manualmente

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Clean dist/build
        shell: pwsh
        run: |
          if (Test-Path "dist")  { Remove-Item -Recurse -Force "dist" }
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }

      - name: Build with PyInstaller (ONEDIR)
        shell: bash
        run: |
          python -m PyInstaller build.spec --clean --noconfirm
          ls -la dist || dir dist

      # Tomamos el nombre de la app desde version.py y la versión desde el TAG
      - name: Resolve app & version (from TAG)
        id: meta
        shell: bash
        run: |
          APP="$(python -c "from version import __app_name__; print(__app_name__)")"
          VER="${GITHUB_REF_NAME#v}"   # e.g. v1.2.3 -> 1.2.3
          echo "APP=$APP" >> "$GITHUB_OUTPUT"
          echo "VER=$VER" >> "$GITHUB_OUTPUT"
          echo "Ref=$GITHUB_REF  Name=$GITHUB_REF_NAME  App=$APP  Ver=$VER"

      - name: Zip ONEDIR folder (handles spaces)
        shell: pwsh
        run: |
          $app = "${{ steps.meta.outputs.APP }}"
          $ver = "${{ steps.meta.outputs.VER }}"
          $src = Join-Path "dist" $app
          $zip = "Compraventas-v$ver-onedir.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          # IMPORTANTE: Usar $true para incluir la carpeta raíz en el ZIP
          [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $zip, [System.IO.Compression.CompressionLevel]::Optimal, $true)
          Write-Host "Created $zip at $(Resolve-Path $zip)"

      # NUEVO: Instalar WiX Toolset
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          Write-Host "Instalando WiX Toolset..."
          dotnet tool install --global wix --version 4.0.4

          Write-Host "Instalando extension WixToolset.UI.wixext..."
          wix extension add WixToolset.UI.wixext

          Write-Host "Verificando instalación..."
          dotnet tool list -g
          wix extension list

      # NUEVO: Compilar instalador MSI
      - name: Build MSI Installer
        shell: pwsh
        run: |
          Write-Host "Compilando instalador MSI..."
          $ver = "${{ steps.meta.outputs.VER }}"

          # Actualizar versión en installer.wxs
          (Get-Content installer.wxs) -replace '(?<=ProductVersion = ")[0-9.]+', $ver | Set-Content installer.wxs

          # Compilar con WiX
          if (!(Test-Path "msi_output")) { New-Item -ItemType Directory -Path "msi_output" }

          wix build installer.wxs -o "msi_output\Tu.local.2025.v$ver.msi"

          if (Test-Path "msi_output\Tu.local.2025.v$ver.msi") {
            Write-Host "✓ MSI generado exitosamente"
            $size = (Get-Item "msi_output\Tu.local.2025.v$ver.msi").Length / 1MB
            Write-Host "  Tamaño: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "✗ ERROR: No se generó el MSI"
            exit 1
          }

      # Crear el release y subir assets (ZIP, EXE y MSI)
      - name: Create Release and Upload assets (gh)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          VER="${{ steps.meta.outputs.VER }}"
          APP="${{ steps.meta.outputs.APP }}"
          ZIP="Compraventas-v${VER}-onedir.zip"
          EXE="dist/$APP/$APP.exe"
          MSI="msi_output/Tu.local.2025.v${VER}.msi"

          echo "Creating release $TAG with assets:"
          echo " - $ZIP"
          echo " - $EXE"
          echo " - $MSI"

          gh release create "$TAG" "$ZIP" "$EXE" "$MSI" \
            --title "$TAG" \
            --notes "Release $TAG - Incluye instalador MSI profesional" \
            --latest
